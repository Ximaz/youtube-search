name: youtube-search

services:
  database:
    image: pgvector/pgvector:pg17@sha256:feb68f4f15446397d8cac7f4fe48fe4586de83160d1fc48b46283312d1a33966
    env_file: [secrets/database/database.env]
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: valkey/valkey:8@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f
    env_file: [secrets/cache/cache.env]
    # Disable the default (unauthenticated) user and provision a single ACL user
    # from the cache secrets. Credentials are expanded in-container ($$ → $).
    command:
      - sh
      - -c
      - |
        exec valkey-server --save "60 1" --appendonly no --user default off --user "$$VALKEY_USERNAME" on ">$$VALKEY_PASSWORD" "~*" "&*" "+@all"
    volumes:
      - valkeydata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --user \"$$VALKEY_USERNAME\" -a \"$$VALKEY_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  storage:
    image: chrislusf/seaweedfs:3.97@sha256:bb05d66d2963b1cc48073190781c3dd29e2c4c88a2ae2986bf58e38c86d89c6e
    env_file: [secrets/storage/storage.env]
    # The image entrypoint is `weed`, so override it to a shell. Generate the S3
    # identity config from env (source of truth stays the env vars), then run the
    # all-in-one server with the S3 gateway on :8333.
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<EOF
        {"identities":[{"name":"app","credentials":[{"accessKey":"$$S3_ACCESS_KEY_ID","secretKey":"$$S3_SECRET_ACCESS_KEY"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
        EOF
        exec weed server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    volumes:
      - seaweeddata:/data
    ports:
      - "127.0.0.1:8333:8333"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: [secrets/app/app.env]
    depends_on:
      database: { condition: service_healthy }
      cache: { condition: service_healthy }
      storage: { condition: service_started }
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: [secrets/app/app.env]
    depends_on:
      database: { condition: service_healthy }
      cache: { condition: service_healthy }
      storage: { condition: service_started }
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  pgdata:
  valkeydata:
  seaweeddata:
